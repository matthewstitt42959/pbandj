services:
  - type: web
    name: pb-and-jay
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: AI_PROVIDER
        value: openai
