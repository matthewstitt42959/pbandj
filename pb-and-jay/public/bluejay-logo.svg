<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Play By Jay RPG - Blue Jay mascot">
  <defs>
    <radialGradient id="bodyGrad" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="wingGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>
  </defs>

  <!-- Tail feathers -->
  <path d="M 42 98 L 34 116 L 48 105 L 60 118 L 72 105 L 86 116 L 78 98" fill="#1d4ed8"/>
  <path d="M 48 100 L 42 112 L 54 104" fill="#2563eb" opacity="0.6"/>
  <path d="M 72 100 L 78 112 L 66 104" fill="#2563eb" opacity="0.6"/>

  <!-- Body -->
  <ellipse cx="60" cy="76" rx="27" ry="30" fill="url(#bodyGrad)"/>

  <!-- White belly -->
  <ellipse cx="60" cy="84" rx="17" ry="19" fill="#f0eefc"/>

  <!-- Left wing -->
  <path d="M 34 65 Q 20 78 24 100 Q 38 90 46 76" fill="url(#wingGrad)"/>
  <!-- Wing bar details -->
  <path d="M 26 74 L 40 79" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M 24 83 L 40 89" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M 25 92 L 38 97" stroke="white" stroke-width="2" opacity="0.4"/>

  <!-- Black necklace band -->
  <path d="M 38 63 Q 60 72 82 63" stroke="#0f172a" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="60" cy="46" r="23" fill="url(#bodyGrad)"/>

  <!-- Black cap/mask -->
  <path d="M 38 40 Q 45 25 60 24 Q 75 25 82 40 Q 74 52 60 50 Q 46 52 38 40Z" fill="#0f172a"/>

  <!-- Crest feathers -->
  <path d="M 56 25 L 49 7 L 57 17 L 60 5 L 63 17 L 71 7 L 64 25" fill="#1d4ed8"/>
  <path d="M 60 5 L 60 24" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>

  <!-- White cheek patch -->
  <ellipse cx="67" cy="52" rx="11" ry="9" fill="#f0eefc"/>

  <!-- Eye -->
  <circle cx="69" cy="46" r="5" fill="#0f172a"/>
  <circle cx="71" cy="44" r="2" fill="white"/>

  <!-- Beak -->
  <path d="M 80 50 L 98 46 L 80 58 Z" fill="#ffc857"/>
  <path d="M 80 50 L 98 46 L 89 52 Z" fill="#e5a800"/>

  <!-- Scroll held in right wing/foot area -->
  <g transform="translate(68, 86)">
    <!-- Scroll end caps -->
    <ellipse cx="5" cy="10" rx="5" ry="10" fill="#fef3c7" stroke="#ffc857" stroke-width="1.5"/>
    <ellipse cx="29" cy="10" rx="5" ry="10" fill="#fef3c7" stroke="#ffc857" stroke-width="1.5"/>
    <!-- Scroll body -->
    <rect x="5" y="1" width="24" height="18" fill="#fef9e7"/>
    <!-- Lines of text on scroll -->
    <line x1="8" y1="6" x2="26" y2="6" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="8" y1="10" x2="26" y2="10" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="8" y1="14" x2="20" y2="14" stroke="#9ca3af" stroke-width="1.5"/>
    <!-- Small d20 symbol on scroll -->
    <polygon points="17,3 20,8 14,8" fill="none" stroke="#ffc857" stroke-width="1"/>
  </g>
</svg>
